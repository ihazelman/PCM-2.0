<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="css/styles.css">
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<title>PCM — Acesso</title>
<style>
body {
  background: linear-gradient(135deg, #001f6b 0%, #003087 55%, #004aad 100%);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
}

.login-wrap { width: 100%; max-width: 400px; }

.login-brand { text-align: center; margin-bottom: 28px; }
.login-brand img { height: 42px; filter: brightness(0) invert(1); opacity: .9; }
.login-brand-fallback {
  font-size: 22px; font-weight: 800; color: #fff;
  letter-spacing: -.02em; display: none;
}
.login-brand-fallback span { color: #FF6B00; }
.login-brand h2 {
  font-family: var(--font-ui); font-size: var(--fs-sm);
  font-weight: 500; color: rgba(255,255,255,.55);
  margin-top: 10px; letter-spacing: .06em; text-transform: uppercase;
}

.login-card {
  background: var(--white);
  border-radius: 14px;
  box-shadow: 0 24px 64px rgba(0,0,0,.35);
  overflow: hidden;
}

.login-tabs { display: flex; border-bottom: 1px solid var(--border); }
.login-tab {
  flex: 1; padding: 14px 0;
  font-family: var(--font-ui); font-size: var(--fs-base); font-weight: 600;
  text-align: center; cursor: pointer; color: var(--text3);
  border: none; border-bottom: 2px solid transparent; margin-bottom: -1px;
  background: none; transition: all .15s;
}
.login-tab.active { color: var(--navy); border-bottom-color: var(--navy); background: var(--white); }
.login-tab:not(.active):hover { background: var(--bg); color: var(--text2); }

.login-form { padding: 28px 28px 8px; display: none; }
.login-form.active { display: block; }
.login-form .form-group { margin-bottom: 14px; }

.btn-login {
  width: 100%; padding: 11px;
  background: linear-gradient(135deg, var(--navy) 0%, var(--navy2) 100%);
  color: #fff; border: none; border-radius: 8px;
  font-family: var(--font-ui); font-size: var(--fs-md); font-weight: 700;
  cursor: pointer; margin-top: 6px; letter-spacing: .02em;
  box-shadow: 0 3px 10px rgba(0,48,135,.3); transition: all .15s;
}
.btn-login:hover { opacity: .9; transform: translateY(-1px); }
.btn-login:active { transform: translateY(0); }

.login-msg {
  margin-top: 12px; padding: 9px 12px; border-radius: 7px;
  font-family: var(--font-ui); font-size: var(--fs-sm); font-weight: 600;
  display: none; border-left: 3px solid;
}
.login-msg.error   { background: var(--danger-bg); color: var(--danger); border-color: var(--danger); display: block; }
.login-msg.success { background: var(--green-bg);  color: var(--green);  border-color: var(--green);  display: block; }

.login-footer {
  text-align: center; padding: 16px 28px 20px;
  font-family: var(--font-ui); font-size: var(--fs-xs); color: var(--text3);
  border-top: 1px solid var(--border2); margin-top: 16px;
}

.pass-wrap { position: relative; }
.pass-toggle {
  position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
  background: none; border: none; cursor: pointer; color: var(--text3);
  font-size: 13px; padding: 2px 4px; line-height: 1;
  transition: color .15s;
}
.pass-toggle:hover { color: var(--navy); }
</style>
</head>
<body>

<div class="login-wrap">

  <div class="login-brand">
    <img src="https://www.onesubsea.slb.com/-/media/onesubseajv/images/logos/jv_mainlogo.svg"
         alt="SLB OneSubsea"
         onerror="this.style.display='none';document.querySelector('.login-brand-fallback').style.display='block'">
    <div class="login-brand-fallback">SLB <span>OneSubsea</span></div>
    <h2>PCM · Planejamento e Controle de Material</h2>
  </div>

  <div class="login-card">
    <div class="login-tabs">
      <button class="login-tab active" id="tab-login"    onclick="switchTab('login')">Entrar</button>
      <button class="login-tab"        id="tab-register" onclick="switchTab('register')">Criar conta</button>
    </div>

    <!-- FORM: LOGIN -->
    <div class="login-form active" id="form-login">
      <div class="form-group">
        <label class="form-label">Email <span class="req">*</span></label>
        <input class="form-input" type="email" id="l-email" placeholder="seu@email.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label class="form-label">Senha <span class="req">*</span></label>
        <div class="pass-wrap">
          <input class="form-input" type="password" id="l-pass" placeholder="••••••••"
                 autocomplete="current-password" style="padding-right:36px;">
          <button class="pass-toggle" onclick="togglePass('l-pass',this)" tabindex="-1">👁</button>
        </div>
      </div>
      <button class="btn-login" id="btn-login" onclick="doLogin()">Entrar</button>
      <div class="login-msg" id="login-msg"></div>
    </div>

    <!-- FORM: REGISTER -->
    <div class="login-form" id="form-register">
      <div class="form-group">
        <label class="form-label">Nome completo <span class="req">*</span></label>
        <input class="form-input" type="text" id="r-name" placeholder="Seu nome">
      </div>
      <div class="form-group">
        <label class="form-label">Email <span class="req">*</span></label>
        <input class="form-input" type="email" id="r-email" placeholder="seu@email.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label class="form-label">Senha <span class="req">*</span></label>
        <div class="pass-wrap">
          <input class="form-input" type="password" id="r-pass" placeholder="Mínimo 6 caracteres"
                 autocomplete="new-password" style="padding-right:36px;">
          <button class="pass-toggle" onclick="togglePass('r-pass',this)" tabindex="-1">👁</button>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Confirmar senha <span class="req">*</span></label>
        <div class="pass-wrap">
          <input class="form-input" type="password" id="r-pass2" placeholder="Repita a senha"
                 autocomplete="new-password" style="padding-right:36px;">
          <button class="pass-toggle" onclick="togglePass('r-pass2',this)" tabindex="-1">👁</button>
        </div>
      </div>
      <button class="btn-login" onclick="doRegister()">Criar conta</button>
      <div class="login-msg" id="register-msg"></div>
    </div>

    <div class="login-footer">PCM v2.0 &nbsp;·&nbsp; SLB OneSubsea</div>
  </div>

</div>

<script>
// ── Firebase ──────────────────────────────────────────────────────────────
const _CFG = {
  apiKey: "AIzaSyCU_2HPubm_C7o3QrsGLvLKsh2FaZZFOXo",
  authDomain: "pcm-2-0.firebaseapp.com",
  projectId: "pcm-2-0",
  storageBucket: "pcm-2-0.firebasestorage.app",
  messagingSenderId: "541983140468",
  appId: "1:541983140468:web:8ff0c46c73ecb5e8823f21"
};
if (!firebase.apps.length) firebase.initializeApp(_CFG);
const _auth = firebase.auth();
const _db   = firebase.firestore();

// Redirect se já logado (flag evita redirect durante o cadastro)
let _registering = false;
_auth.onAuthStateChanged(user => { if (user && !_registering) location.href = 'home.html'; });

// ── Tabs ──────────────────────────────────────────────────────────────────
function switchTab(tab){
  document.getElementById('tab-login').classList.toggle('active',    tab === 'login');
  document.getElementById('tab-register').classList.toggle('active', tab === 'register');
  document.getElementById('form-login').classList.toggle('active',    tab === 'login');
  document.getElementById('form-register').classList.toggle('active', tab === 'register');
  clearMsgs();
}

function clearMsgs(){
  ['login-msg','register-msg'].forEach(id => {
    const el = document.getElementById(id);
    el.className = 'login-msg'; el.textContent = '';
  });
}

function showMsg(id, msg, type){
  const el = document.getElementById(id);
  el.textContent = msg;
  el.className = `login-msg ${type}`;
}

// ── Password toggle ───────────────────────────────────────────────────────
function togglePass(id, btn){
  const el = document.getElementById(id);
  el.type = el.type === 'password' ? 'text' : 'password';
  btn.textContent = el.type === 'password' ? '👁' : '🙈';
}

// ── Login ─────────────────────────────────────────────────────────────────
async function doLogin(){
  const email = document.getElementById('l-email').value.trim().toLowerCase();
  const pass  = document.getElementById('l-pass').value;
  if(!email || !pass){ showMsg('login-msg','Preencha todos os campos.','error'); return; }
  const btn = document.getElementById('btn-login');
  btn.disabled = true; btn.textContent = '...';
  try {
    const cred = await _auth.signInWithEmailAndPassword(email, pass);
    const snap = await _db.collection('pcm_users').doc(cred.user.uid).get();
    const profile = snap.exists ? snap.data() : { name: email, role: 'user', email };
    sessionStorage.setItem('pcm_session', JSON.stringify({
      email: profile.email || email,
      name:  profile.name  || email,
      role:  profile.role  || 'user',
      uid:   cred.user.uid
    }));
    location.href = 'home.html';
  } catch(e) {
    btn.disabled = false; btn.textContent = 'Entrar';
    const AUTH_ERRS = ['auth/user-not-found','auth/wrong-password','auth/invalid-credential','auth/invalid-email'];
    showMsg('login-msg', AUTH_ERRS.includes(e.code) ? 'E-mail ou senha incorretos.' : 'Erro ao entrar. Tente novamente.', 'error');
  }
}

// ── Register ──────────────────────────────────────────────────────────────
async function doRegister(){
  const name  = document.getElementById('r-name').value.trim();
  const email = document.getElementById('r-email').value.trim().toLowerCase();
  const pass  = document.getElementById('r-pass').value;
  const pass2 = document.getElementById('r-pass2').value;
  if(!name || !email || !pass || !pass2){ showMsg('register-msg','Preencha todos os campos.','error'); return; }
  if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){ showMsg('register-msg','E-mail inválido.','error'); return; }
  if(pass.length < 6){ showMsg('register-msg','Senha deve ter pelo menos 6 caracteres.','error'); return; }
  if(pass !== pass2){ showMsg('register-msg','As senhas não coincidem.','error'); return; }
  const btn = document.querySelector('#form-register .btn-login');
  if(btn){ btn.disabled = true; btn.textContent = '...'; }
  _registering = true;
  try {
    console.log('[1] Iniciando cadastro para:', email);
    const cred = await _auth.createUserWithEmailAndPassword(email, pass);
    console.log('[2] Conta criada no Auth. UID:', cred.user.uid);
    const adminSnap = await _db.collection('pcm_users').where('role','==','admin').limit(1).get();
    console.log('[3] Admin query OK. empty:', adminSnap.empty);
    const role = adminSnap.empty ? 'admin' : 'user';
    await _db.collection('pcm_users').doc(cred.user.uid).set({ email, name, role });
    console.log('[4] Perfil salvo no Firestore. role:', role);
    sessionStorage.setItem('pcm_session', JSON.stringify({ email, name, role, uid: cred.user.uid }));
    showMsg('register-msg','Conta criada! Redirecionando...','success');
    setTimeout(() => location.href = 'home.html', 900);
  } catch(e) {
    _registering = false;
    if(btn){ btn.disabled = false; btn.textContent = 'Criar conta'; }
    console.error('Erro no cadastro — code:', e.code, '| message:', e.message, '| full:', e);
    const msg = e.code === 'auth/email-already-in-use' ? 'E-mail já cadastrado.'
              : e.code === 'auth/weak-password'         ? 'Senha muito fraca (mínimo 6 caracteres).'
              : `Erro ao criar conta: ${e.code || e.message}`;
    showMsg('register-msg', msg, 'error');
  }
}

// ── Enter key ─────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if(e.key !== 'Enter') return;
  if(document.getElementById('form-login').classList.contains('active')) doLogin();
  else doRegister();
});
</script>
</body>
</html>
